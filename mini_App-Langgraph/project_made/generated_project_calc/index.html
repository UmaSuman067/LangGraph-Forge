<!DOCTYPE html>
<!-- Main calculator page. This file sets up the structure that will be styled by style.css and controlled by script.js -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Calculator container -->
    <div id="calculator">
        <!-- Display area -->
        <div id="display">
            <input type="text" id="display" readonly>
        </div>
        <!-- Buttons grid -->
        <div id="buttons">
            <!-- Clear button -->
            <button class="btn clear" id="clear">C</button>
            <!-- Operators -->
            <button class="btn operator" data-op="/">/</button>
            <button class="btn operator" data-op="*">*</button>
            <button class="btn operator" data-op="-">-</button>
            <button class="btn operator" data-op="+">+</button>
            <!-- Numbers 7-9 -->
            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <!-- Numbers 4-6 -->
            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <!-- Numbers 1-3 -->
            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <!-- Decimal and 0 and equals -->
            <button class="btn decimal" data-value=".">.</button>
            <button class="btn number" data-value="0">0</button>
            <button class="btn equals" id="equals">=</button>
        </div>
    </div>
    <!-- JavaScript logic -->
    <script src="script.js" defer></script>
</body>
</html>
